<div class="main__information wrapper">
  <app-career></app-career>
  <app-hobby></app-hobby>
  <section class="articles">
    <app-paggination-button
      [disabledButtonLeft]="isBeginOfPage"
      [direction]="false"
      (pageChange)="changingPage($event)"
      class="paggiation-component__element"
    ></app-paggination-button>
    <div class="last-articles">
      <app-article-component
        (isEditFormOpenFlag)="openEditArticleForm($event)"
        [articleArray]="articlesStorage"
        (articleToDelete)="removeArticle($event)"
      ></app-article-component>
    </div>
    <app-paggination-button
      [disabledButtonRight]="isEndOfPage"
      [direction]="true"
      (pageChange)="changingPage($event)"
      class="paggiation-component__element"
    ></app-paggination-button>
  </section>
  <app-works></app-works>
  <div #form class="form">
    <app-add-article-form
      [editData]="editArticleData"
      (dataOutEdit)="updateArticle($event)"
    ></app-add-article-form>
  </div>
</div>
