<div class="main__information wrapper">
  <app-career></app-career>
  <app-hobby></app-hobby>
  <section class="last-articles">
    <app-article-component
      (isEditFormOpenFlag)="openEditArticleForm($event)"
      [articleArray]="storage.articleStorage()"
      (articleToDelete)="removeArticle($event)"
    ></app-article-component>
    <div class="paggination-buttons">
      <app-paggination-button [direction]="'left'"></app-paggination-button>
      <app-paggination-button [direction]="'right'"></app-paggination-button>
    </div>
  </section>
  <app-works></app-works>
  <div #form class="form">
    <app-add-article-form
      [editData]="editArticleData"
      (dataOutEdit)="updateArticle($event)"
    ></app-add-article-form>
  </div>
</div>
