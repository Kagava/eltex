<section class="last-articles">
  <h2 class="last_articles__header">Последний статьи</h2>
  <div class="last-articles__content">
    @for (article of outputArticles; track article.id) {
      <div class="last-articles__article article" [class]="article.category">
        <div class="article__text">
          <h4 class="last-articles__article-header">
            {{ article.title }}
          </h4>
          <p class="last-articles__date date">
            <time [attr.datetime]="article.date">{{ article.dateFormatted }}</time>
          </p>
          <p class="last_articles__information information">{{ article.description }}</p>
        </div>
        <div class="article__image-container">
          <img
            src="assets/article-foto.png"
            alt="Картиночка для статьи"
            class="image-container__image"
          />
        </div>
      </div>
    }
  </div>
  <a href="#" class="last-articles__link-to-blog-page link-to-blog-page">Посмотреть все статьи</a>
</section>
