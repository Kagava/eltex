@if (currentArticle()) {
  <div class="wrapper article-container">
    <div class="article" [class]="currentArticle()?.category">
      <div class="aritlce__image">
        <img [src]="currentArticle()?.image" [alt]="currentArticle()?.title" />
      </div>
      <div class="article__title">
        <h2 class="article__header">{{ currentArticle()?.title }}</h2>
        <p class="article__date">
          <time [attr.datetime]="currentArticle()?.date"
            ><i>Опубликовано: {{ currentArticle()?.dateFormatted }}</i></time
          >
        </p>
      </div>
      <div class="article__description">{{ currentArticle()?.description }}</div>
    </div>
    <div class="comments">
      <app-comment-component [comments]="currentArticle()?.comments"> </app-comment-component>
    </div>
  </div>
} @else {
  SOMETHING WENT WRONG
}
