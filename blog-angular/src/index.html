<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BlogAngular</title>
    <base href="/eltex/blog/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
  </head>
  <body>
    <script>
      (function () {
        const base = '/eltex/blog';
        const redirect = sessionStorage.getItem('ghRedirect');
        if (redirect) {
          sessionStorage.removeItem('ghRedirect');
          history.replaceState(null, null, base + redirect);
        }
      })();
    </script>
    <app-root></app-root>
  </body>
</html>
