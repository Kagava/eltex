<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <base href="/eltex/blog/" />
    <script>
      const path = location.pathname.replace('/eltex/blog', '').replace(/\/$/, '') || '/';
      sessionStorage.ghRedirect = path;
      location.replace('/eltex/blog/');
    </script>
  </head>
  <body></body>
</html>
